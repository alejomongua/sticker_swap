es:
  activerecord:
    models:
      inventory_item: Inventario
      invitation_code: Código de invitación
      sticker: Figura
      swap_offer: Propuesta de intercambio
      user: Usuario
    attributes:
      invitation_code:
        code: Código de invitación
      swap_offer:
        receiver: Contacto
        requested_sticker: Figura solicitada
      user:
        current_password: Contraseña actual
        email: Correo electrónico
        password: Contraseña
        password_confirmation: Confirmación de contraseña
        receive_offer_notifications: Recibir notificaciones por correo
        username: Nombre de usuario
  errors:
    format: "%{message}"
    messages:
      blank: no puede estar vacío
      confirmation: no coincide con la confirmación
      greater_than_or_equal_to: debe ser mayor o igual a %{count}
      invalid: no es válido
      taken: ya está en uso
      too_short: debe tener al menos %{count} caracteres